<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Action — Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .result-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(37,99,235,0.12);
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .icon-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
        }
        .icon-success { background: #F0FDF4; color: #16A34A; }
        .icon-warning { background: #FFFBEB; color: #D97706; }
        .icon-danger  { background: #FEF2F2; color: #DC2626; }
        .icon-loading { background: #EFF6FF; color: #2563EB; }
    </style>
</head>
<body>
    <div class="result-card" id="resultCard">
        <div class="icon-circle icon-loading" id="iconDiv">
            <i class="fas fa-spinner fa-spin" id="iconEl"></i>
        </div>
        <h4 class="fw-bold" id="titleEl">Processing...</h4>
        <p class="text-muted" id="messageEl">Please wait while we process your request.</p>
        <div id="detailsEl"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // This page is the landing page after candidate clicks action links in email.
        // The backend handles the action and redirects here, or the frontend reads URL params.

        // Read action result from URL query params
        const params = new URLSearchParams(window.location.search);
        const action = params.get('action') || 'unknown';
        const success = params.get('success') !== 'false';
        const message = params.get('message') || '';

        const iconDiv = document.getElementById('iconDiv');
        const iconEl = document.getElementById('iconEl');
        const titleEl = document.getElementById('titleEl');
        const messageEl = document.getElementById('messageEl');

        if (action === 'confirm' && success) {
            iconDiv.className = 'icon-circle icon-success';
            iconEl.className = 'fas fa-check-circle';
            titleEl.textContent = 'Interview Confirmed!';
            messageEl.textContent = 'Thank you! Your interview has been confirmed. You will receive a calendar invite with the Google Meet link shortly.';
        } else if (action === 'reschedule') {
            iconDiv.className = 'icon-circle icon-warning';
            iconEl.className = 'fas fa-calendar-alt';
            titleEl.textContent = 'Reschedule Requested';
            messageEl.textContent = 'Your reschedule request has been received. Our HR team will contact you soon with a new interview time.';
        } else if (action === 'cancel' && success) {
            iconDiv.className = 'icon-circle icon-danger';
            iconEl.className = 'fas fa-times-circle';
            titleEl.textContent = 'Interview Cancelled';
            messageEl.textContent = 'Your interview has been cancelled. A confirmation email has been sent to you. We hope to connect again soon!';
        } else if (!success) {
            iconDiv.className = 'icon-circle icon-danger';
            iconEl.className = 'fas fa-exclamation-circle';
            titleEl.textContent = 'Action Failed';
            messageEl.textContent = message || 'This link may have expired or already been used. Please contact HR.';
        }
    </script>
</body>
</html>
