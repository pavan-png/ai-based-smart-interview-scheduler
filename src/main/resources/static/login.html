<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Platform — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(37,99,235,0.12);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .btn-login {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-login:hover { background: var(--primary-dark); color: #fff; }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .error-box {
            background: #FEF2F2;
            border: 1px solid #FCA5A5;
            color: #DC2626;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-logo"><i class="fas fa-calendar-check me-2"></i>InterviewAI</div>
            <p class="text-muted mt-2 mb-0">HR Dashboard Login</p>
        </div>

        <div id="error-box" class="error-box mb-3 d-none"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="username"
                           placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="password"
                           placeholder="Enter your password" required>
                    <button type="button" class="btn btn-outline-secondary" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100" id="loginBtn">
                <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
                Sign In
            </button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:0.8rem;">
            <i class="fas fa-shield-alt me-1"></i>Secured with JWT Authentication
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const errorBox = document.getElementById('error-box');

            // Reset errors
            errorBox.classList.add('d-none');

            // Show loading
            loginBtn.disabled = true;
            spinner.classList.remove('d-none');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Store token and user info
                    localStorage.setItem('authToken', data.data.token);
                    localStorage.setItem('username', data.data.username);
                    localStorage.setItem('userEmail', data.data.email);
                    localStorage.setItem('userRole', data.data.role);

                    // Redirect to dashboard
                    window.location.href = '/dashboard.html';
                } else {
                    errorBox.textContent = data.message || 'Login failed. Please check your credentials.';
                    errorBox.classList.remove('d-none');
                }

            } catch (err) {
                errorBox.textContent = 'Connection error. Please try again.';
                errorBox.classList.remove('d-none');
            } finally {
                loginBtn.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('authToken')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
