# Database
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=practice
spring.datasource.password=1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=YourSuperSecretJWTSigningKeyThatIsAtLeast256BitsLong_ChangeInProduction
app.jwt.expiration-ms=86400000
app.jwt.action-token-expiration-ms=604800000

# Grok AI (Groq)
app.grok.api-url=https://api.groq.com/openai/v1/chat/completions
app.grok.api-key=
app.grok.model=llama-3.3-70b-versatile

# Google API (OAuth2 - replace filename below with your actual client_secret file name)
# Place the file at: src/main/resources/static/client_secret_xxxx.json
app.google.credentials-file=classpath:static/google-credentials.json
app.google.application-name=Interview Platform
app.google.calendar-id=primary
app.google.sender-email=mohanpavankalyan01@gmail.com
app.google.enabled=true
# Folder where the OAuth token is saved after first-time browser login (relative to project root)
app.google.tokens-dir=tokens

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mohanpavankalyan53@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Company
app.company.name=TechCorp Solutions
app.company.website=https://www.techcorp.com
app.company.logo-url=https://www.techcorp.com/logo.png

# Base URL
app.base-url=http://localhost:8080

# Bean override
spring.main.allow-bean-definition-overriding=false

# Gmail IMAP (for reading candidate reply emails)
spring.mail.imap.host=imap.gmail.com
spring.mail.imap.port=993
spring.mail.imap.ssl.enable=true

# AI Email Polling (every 2 minutes = 120000 ms)
app.email.polling.fixed-delay-ms=120000